name: GeoLoop CI

on:
  push:
    branches: [main]
    paths:
      - "geoloop/**"
      - ".github/workflows/geoloop-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "geoloop/**"
      - ".github/workflows/geoloop-ci.yml"

defaults:
  run:
    working-directory: geoloop

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t geoloop:test .
