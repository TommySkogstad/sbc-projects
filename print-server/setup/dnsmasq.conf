# dnsmasq konfigurasjon — captive portal DHCP/DNS for WiFi-onboarding.
# Bind kun til wlan0 så vi ikke krasjer med systemd-resolved på port 53.
interface=wlan0
bind-interfaces
# DHCP-leases for klienter som kobler til "printer-rock-setup"-AP-en
dhcp-range=192.168.4.10,192.168.4.50,255.255.255.0,12h
# DNS-hijack: alle navn løses til captive-portal IP (192.168.4.1)
address=/#/192.168.4.1
# Ikke bruk /etc/resolv.conf — vi vil ikke videresende noe
no-resolv
log-queries
