# hostapd konfigurasjon — captive portal AP for WiFi-onboarding.
# Åpent nett (ingen WPA2) er bevisst valg: brukeren har ikke noe passord å
# slå opp, og AP-en kjører kun mens enheten ikke har gyldig WiFi-konfig.
# Captive-portal og wifi-check stopper AP umiddelbart etter første vellykket
# reconnect til kjent nett.
interface=wlan0
driver=nl80211
ssid=printer-rock-setup
hw_mode=g
channel=6
auth_algs=1
wmm_enabled=0
ignore_broadcast_ssid=0
